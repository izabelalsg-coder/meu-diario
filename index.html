/* ── HELPERS ──────────────────────────────────────────────────── */
function toISO(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function pdi(iso){
  const d=new Date(iso);
  return{dn:d.getDate().toString().padStart(2,"0"),ms:MPT[d.getMonth()].slice(0,3).toLowerCase(),yr:d.getFullYear(),full:d.toLocaleDateString("pt-BR",{day:"numeric",month:"long",year:"numeric"}),iso:toISO(d)};
}
const dark=c=>c==="#1C1C1E"||c==="#1A2416";
function dc(bg){
  const map={
    "#FAF7F0":"#7A604A","#FFF0ED":"#A85040","#EFF8F4":"#3A7055","#EFF4FB":"#3A5A90","#F3EFF9":"#584A90",
    "#1C1C1E":"rgba(255,255,255,0.68)","#1A2416":"rgba(255,255,255,0.65)","#FFFFFF":"#000","#000000":"#fff",
  };
  if(map[bg])return map[bg];
  // Para qualquer cor pastel fora do mapa, calcula um tom mais escuro/saturado
  try{
    const r=parseInt(bg.slice(1,3),16),g=parseInt(bg.slice(3,5),16),b=parseInt(bg.slice(5,7),16);
    // Escurece 40% e satura levemente
    const darken=v=>Math.max(0,Math.round(v*0.55));
    return`rgb(${darken(r)},${darken(g)},${darken(b)})`;
  }catch{return"#1a1410";}
}
function useMob(){
  const [m,sm]=useState(()=>window.innerWidth<768);
  useEffect(()=>{const h=()=>sm(window.innerWidth<768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  return m;
}
function emailName(e){return e?e.split("@")[0]:"";}
function getRandomPastel(){return PASTEL_COLORS[Math.floor(Math.random()*PASTEL_COLORS.length)];}

function devoPreview(entry){const d=devoContent(entry);return d.gratidao||d.anotacoes||d.leitura||"";}

/* ── DB ────────────────────────────────────────────────────────── */
function r2e(r){return{id:r.id,date:r.date,content:r.content,tags:r.tags||[],font:r.font,bg:r.bg,fontSize:r.font_size||17,createdAt:r.created_at,type:r.type||"diary"};}
function e2r(e,uid){return{id:e.id,user_id:uid,date:e.date,content:e.content,tags:e.tags||[],font:e.font,bg:e.bg,font_size:e.fontSize||17,created_at:e.createdAt,type:e.type||"diary"};}
async function dbLoad(){const{data,error}=await sb.from("diary_entries").select("*").order("date",{ascending:false});if(error)throw error;return(data||[]).map(r2e);}
async function dbSave(entry,uid){const{error}=await sb.from("diary_entries").upsert(e2r(entry,uid));if(error)throw error;}
async function dbDelete(id){const{error}=await sb.from("diary_entries").delete().eq("id",id);if(error)throw error;}

async function devoToCanvas(entry){

  const mkLabel=(txt,bg,color)=>{const p=document.createElement("div");p.style.cssText=`background:${bg};color:${color};font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;padding:5px 16px;border-radius:20px;display:inline-block;margin-bottom:8px;font-family:'DM Sans',sans-serif;`;p.textContent=txt;return p;};
  const mkBox=(border,minH,children)=>{const d=document.createElement("div");d.style.cssText=`border:2px solid ${border};border-radius:10px;padding:14px;min-height:${minH}px;display:flex;flex-direction:column;gap:8px;`;children.forEach(c=>d.appendChild(c));return d;};

  const el=document.createElement("div");
  el.style.cssText=`position:fixed;left:-9999px;top:0;width:${W}px;background:#F9F5FB;border-radius:0;padding:44px 44px 40px;display:flex;flex-direction:column;gap:16px;min-height:960px;`;

  // Header: title + date + mood
  const hdr=document.createElement("div");hdr.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;";
  const titleSpan=document.createElement("span");titleSpan.style.cssText="font-family:'Dancing Script',cursive;font-size:42px;color:#9070B0;";titleSpan.textContent="Devocional";
  const dateBox=document.createElement("div");dateBox.style.cssText="display:flex;align-items:center;gap:12px;";
  const datePill=document.createElement("div");datePill.style.cssText=`background:#F0C8C0;border-radius:8px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;color:${tc};font-weight:600;`;
  datePill.textContent=`${dn} ${ms}. ${yr}`;
  const moodSpan=document.createElement("span");moodSpan.style.cssText="font-size:28px;";moodSpan.textContent=cv.mood||"";
  dateBox.appendChild(datePill);dateBox.appendChild(moodSpan);
  hdr.appendChild(titleSpan);hdr.appendChild(dateBox);el.appendChild(hdr);

  // Row 1: Gratidão + Oração
  const row1=document.createElement("div");row1.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:14px;";
  row1.appendChild(mkSection("Motivos de Gratidão","#D4B8F0","#5A3880","#BFA8DC",120,cv.gratidao||""));
  row1.appendChild(mkSection("Pedidos de Oração","#B8D8F0","#2A5878","#90BCDC",120,cv.oracao_pedidos||""));
  el.appendChild(row1);

  // Row 2: Leitura + Lições
  const row2=document.createElement("div");row2.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:14px;";

  // Leitura
  const leitSec=document.createElement("div");leitSec.style.cssText="display:flex;flex-direction:column;";
  leitSec.appendChild(mkLabel("Leitura Bíblica","#F0B8D8","#882858"));
  const leitBox=mkBox("#DC98BC",80,[]);
  const leitInput=document.createElement("div");leitInput.style.cssText=`background:#C4D4ED;border-radius:8px;padding:10px 14px;font-family:'Lora',Georgia,serif;font-size:13px;color:${tc};min-height:36px;`;
  leitInput.textContent=cv.leitura||"";leitBox.appendChild(leitInput);leitSec.appendChild(leitBox);
  row2.appendChild(leitSec);

  // Lições
  const licSec=document.createElement("div");licSec.style.cssText="display:flex;flex-direction:column;";
  licSec.appendChild(mkLabel("3 Lições que Aprendi","#B8E0D0","#1A6050"));
  const licBox=mkBox("#90C0B0",80,[]);
  [[cv.licao1||"","#C8B8E0"],[cv.licao2||"","#E8C8D8"],[cv.licao3||"","#F8C0B0"]].forEach(([val,bg])=>{

  anotSec.appendChild(anotBox);el.appendChild(anotSec);

  const footer=mkP("@IZABELALGONCALVES",`font-size:10px;color:${sub};text-align:center;letter-spacing:1px;font-family:'DM Sans',sans-serif;margin-top:8px;`);
  el.appendChild(footer);

  document.body.appendChild(el);
  try{return await window.html2canvas(el,{scale:2,useCORS:true,backgroundColor:"#F9F5FB",logging:false});}finally{document.body.removeChild(el);}
}

/* ── EXPORTAR INSTAGRAM ─────────────────────────────────────── */
async function exportInstagram(entry,fmt){
  const dims={post:{w:1080,h:1350},story:{w:1080,h:1920}};
  const{w:tW,h:tH}=dims[fmt];const SCALE=2;
  const rW=tW/SCALE,rH=tH/SCALE;
  const{dn,ms,yr}=pdi(entry.date);
  const dk=dark(entry.bg||"#FAF7F0");
  const tc=dk?"rgba(255,255,255,0.92)":"#1a1410";
  const d=dc(entry.bg||"#FAF7F0");
  const el=document.createElement("div");
  el.style.cssText=`position:fixed;left:-9999px;top:0;width:${rW}px;height:${rH}px;background:${entry.bg||"#FAF7F0"};display:flex;flex-direction:column;padding:60px 56px 52px;`;
  const ctr=document.createElement("div");ctr.style.cssText="flex:1;display:flex;align-items:center;justify-content:center;";
  const p=document.createElement("p");
  p.style.cssText=`font-family:${entry.font||"'Lora',Georgia,serif"};font-size:${(entry.fontSize||17)+6}px;line-height:1.92;color:${tc};margin:0;white-space:pre-wrap;word-break:break-word;text-align:center;width:100%;`;
  p.textContent=entry.content;ctr.appendChild(p);el.appendChild(ctr);
  const dd=document.createElement("div");dd.style.cssText="display:flex;align-items:baseline;gap:10px;margin-top:32px;";
  const ds=document.createElement("span");ds.style.cssText=`font-family:'Playfair Display',serif;font-size:72px;font-weight:700;color:${d};line-height:1;`;ds.textContent=dn;
  const dm=document.createElement("div");dm.innerHTML=`<div style="font-size:16px;color:${d};line-height:1.3;">${ms}.</div><div style="font-size:16px;color:${d};line-height:1.3;">${yr}</div>`;
  dd.appendChild(ds);dd.appendChild(dm);el.appendChild(dd);
  document.body.appendChild(el);
  try{
    const canvas=await window.html2canvas(el,{scale:SCALE,width:rW,height:rH,useCORS:true,backgroundColor:entry.bg||"#FAF7F0",logging:false});
    const a=document.createElement("a");
    a.download=`frase-${fmt==="story"?"1080x1920":"1080x1350"}-${Date.now()}.png`;
    a.href=canvas.toDataURL("image/png");a.click();
  }finally{document.body.removeChild(el);}
}

/* ── LOGIN ──────────────────────────────────────────────────── */
function Login({onAuth}){
  const [mode,sm]=useState("login");const [email,se]=useState("");const [pass,sp]=useState("");const [msg,smsg]=useState("");const [busy,sb2]=useState(false);
  const go=async()=>{if(!email.trim()||!pass){smsg("Preencha todos os campos.");return;}if(pass.length<6){smsg("Senha deve ter ao menos 6 caracteres.");return;}sb2(true);smsg("");const err=await onAuth(mode,email.trim().toLowerCase(),pass);sb2(false);if(err)smsg(err);};
  const inp={width:"100%",padding:"13px 16px",border:"1.5px solid #EAE0D8",borderRadius:"14px",fontSize:"15px",fontFamily:"'Lora',serif",color:"#1a1410",background:"#FDFAF7",outline:"none"};
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(150deg,#FAF7F0 0%,#F0E4D4 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{background:"white",borderRadius:"28px",padding:"48px 40px",width:"100%",maxWidth:"380px",boxShadow:"0 12px 60px rgba(140,100,60,0.13)"}}>
        <div style={{textAlign:"center",marginBottom:"36px"}}>
          <div style={{fontSize:"40px",marginBottom:"12px"}}>🌿</div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:"30px",fontWeight:700,color:"#1a1410",marginBottom:"6px",letterSpacing:"-0.5px"}}>Meu Diário</h1>
          <p style={{color:"#b5a898",fontSize:"14px",fontStyle:"italic"}}>{mode==="login"?"Bem-vinda de volta":"Crie sua conta privada"}</p>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
          <input type="email" placeholder="E-mail" value={email} onChange={e=>{se(e.target.value);smsg("");}} onKeyDown={e=>e.key==="Enter"&&go()} style={inp} autoComplete="email"/>
          <input type="password" placeholder="Senha (mín. 6 caracteres)" value={pass} onChange={e=>{sp(e.target.value);smsg("");}} onKeyDown={e=>e.key==="Enter"&&go()} style={inp} autoComplete={mode==="login"?"current-password":"new-password"}/>
          {msg&&<p style={{color:TERRACOTTA,fontSize:"13px",textAlign:"center",lineHeight:1.5}}>{msg}</p>}
          <button onClick={go} disabled={busy} style={{width:"100%",padding:"14px",background:busy?"#d4a090":TERRACOTTA,color:"white",border:"none",borderRadius:"14px",fontSize:"15px",fontFamily:"'Playfair Display',serif",cursor:busy?"default":"pointer"}}>
            {busy?<span className="spin">⏳</span>:mode==="login"?"Entrar":"Criar conta"}
          </button>
        </div>
        <p style={{textAlign:"center",marginTop:"20px",fontSize:"13px",color:"#b5a898"}}>
          {mode==="login"?"Não tem conta? ":"Já tem conta? "}
          <span onClick={()=>{sm(mode==="login"?"register":"login");smsg("");}} style={{color:TERRACOTTA,cursor:"pointer",textDecoration:"underline"}}>{mode==="login"?"Crie aqui":"Entrar"}</span>
        </p>
        {mode==="login"&&<p style={{textAlign:"center",marginTop:"8px",fontSize:"12px"}}><span onClick={async()=>{if(!email.trim()){smsg("Digite seu e-mail primeiro.");return;}sb2(true);const{error}=await sb.auth.resetPasswordForEmail(email.trim());sb2(false);smsg(error?"Erro ao enviar.":"E-mail de redefinição enviado!");}} style={{color:"#b5a898",cursor:"pointer",textDecoration:"underline"}}>Esqueceu a senha?</span></p>}
        <p style={{textAlign:"center",marginTop:"14px",fontSize:"11px",color:"#d5c8b8"}}>Sincronizado entre todos os seus dispositivos.</p>
      </div>
    </div>
  );
}

/* ── CALENDÁRIO ─────────────────────────────────────────────── */
function Cal({entries,sel,onSel}){
  const [view,sv]=useState(new Date());
  const yr=view.getFullYear(),mo=view.getMonth();
  const first=new Date(yr,mo,1).getDay(),total=new Date(yr,mo+1,0).getDate();
  const today=new Date();
  const diaryDates=useMemo(()=>new Set(entries.filter(e=>!e.type||e.type==="diary").map(e=>{const d=new Date(e.date);return`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;})),[entries]);
  const fraseDates=useMemo(()=>new Set(entries.filter(e=>e.type==="frase").map(e=>{const d=new Date(e.date);return`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;})),[entries]);
  const devoDates=useMemo(()=>new Set(entries.filter(e=>e.type==="devo").map(e=>{const d=new Date(e.date);return`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;})),[entries]);
  const cells=[...Array(first).fill(null),...Array.from({length:total},(_,i)=>i+1)];
  const isSel=d=>d&&sel&&d===sel.getDate()&&mo===sel.getMonth()&&yr===sel.getFullYear();
  const isT=d=>d===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();
  const nb={background:"none",border:"none",cursor:"pointer",fontSize:"18px",color:TERRACOTTA,padding:"0 6px",lineHeight:1};
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
        <button onClick={()=>sv(new Date(yr,mo-1,1))} style={nb}>‹</button>
        <span style={{fontFamily:"'Playfair Display',serif",fontSize:"13px",color:"#3a2e26",fontWeight:600}}>{MPT[mo].slice(0,3)} {yr}</span>
        <button onClick={()=>sv(new Date(yr,mo+1,1))} style={nb}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px"}}>
        {DS.map((w,i)=><div key={i} style={{textAlign:"center",fontSize:"9px",color:"#c5b8a8",fontWeight:700,padding:"3px 0"}}>{w}</div>)}
        {cells.map((d,i)=>{
          const hasDiary=d&&diaryDates.has(`${yr}-${mo}-${d}`);
          const hasFrase=d&&fraseDates.has(`${yr}-${mo}-${d}`);
          const hasDevo=d&&devoDates.has(`${yr}-${mo}-${d}`);
          return(
            <div key={i} onClick={()=>d&&onSel(new Date(yr,mo,d))}
              style={{position:"relative",textAlign:"center",padding:"5px 2px",paddingBottom:"8px",borderRadius:"7px",fontSize:"11px",cursor:d?"pointer":"default",
                background:isSel(d)?TERRACOTTA:isT(d)?"#F5EDE0":"transparent",
                color:isSel(d)?"white":isT(d)?TERRACOTTA:"#3a2e26",
                fontWeight:(isSel(d)||isT(d))?700:400}}>
              {d||""}
              {d&&(hasDiary||hasFrase||hasDevo)&&!isSel(d)&&(
                <div style={{position:"absolute",bottom:"2px",left:"50%",transform:"translateX(-50%)",display:"flex",gap:"2px",alignItems:"center"}}>
                  {hasDiary&&<span style={{width:"3px",height:"3px",borderRadius:"50%",background:TERRACOTTA,display:"block"}}/>}
                  {hasFrase&&<span style={{width:"3px",height:"3px",borderRadius:"50%",background:LILAC,display:"block"}}/>}
                  {hasDevo&&<span style={{width:"3px",height:"3px",borderRadius:"50%",background:AMBER,display:"block"}}/>}

  );
}

/* ── MODAL PDF ──────────────────────────────────────────────── */
function PdfModal({entries,onClose}){
  const sorted=useMemo(()=>[...entries].sort((a,b)=>new Date(a.date)-new Date(b.date)),[entries]);
  const minD=sorted.length?pdi(sorted[0].date).iso:"";const maxD=sorted.length?pdi(sorted[sorted.length-1].date).iso:"";
  const[from,sf]=useState(minD);const[to,st]=useState(maxD);
  const[allDates,sad]=useState(true);
  const[typeFilter,stf]=useState("both");
  const[busy,sbz]=useState(false);const[prog,sp]=useState(0);
  const inp2={padding:"9px 12px",border:"1.5px solid #EAE0D8",borderRadius:"10px",fontSize:"13px",fontFamily:"'Lora',serif",color:"#1a1410",background:"#FDFAF7",outline:"none",width:"100%"};
  const diaryCount=sorted.filter(e=>!e.type||e.type==="diary").length;
  const fraseCount=sorted.filter(e=>e.type==="frase").length;
  const devoCount=sorted.filter(e=>e.type==="devo").length;
  const typeBtn=(val,label,count)=>(
    <button onClick={()=>stf(val)} style={{flex:1,padding:"10px 4px",borderRadius:"10px",border:`2px solid ${typeFilter===val?TERRACOTTA:"#EAE0D8"}`,background:typeFilter===val?"#FFF5F0":"white",cursor:"pointer",fontFamily:"'Lora',serif",fontSize:"11px",color:typeFilter===val?TERRACOTTA:"#6a5a4a",fontWeight:typeFilter===val?700:400,transition:"all .15s",textAlign:"center"}}>
      {label}<br/><span style={{fontSize:"10px",opacity:0.65}}>{count} entr.</span>
    </button>
  );
  const gen=async()=>{
    let sel=sorted;
    if(typeFilter==="diary") sel=sel.filter(e=>!e.type||e.type==="diary");
    else if(typeFilter==="frases") sel=sel.filter(e=>e.type==="frase");
    else if(typeFilter==="devo") sel=sel.filter(e=>e.type==="devo");
    if(!allDates) sel=sel.filter(e=>{const iso=pdi(e.date).iso;return iso>=from&&iso<=to;});
    if(!sel.length){alert("Nenhuma entrada no filtro selecionado.");return;}
    sbz(true);sp(0);
    const{jsPDF}=window.jspdf;const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const pw=pdf.internal.pageSize.getWidth()-20;const ph=pdf.internal.pageSize.getHeight()-20;
    for(let i=0;i<sel.length;i++){sp(Math.round((i/sel.length)*100));const canvas=await entryToCanvas(sel[i]);const ih=(canvas.height/canvas.width)*pw;if(i>0)pdf.addPage();pdf.addImage(canvas.toDataURL("image/png"),"PNG",10,10,pw,Math.min(ih,ph));}
    sp(100);

  );
}

        <div style={{background:"#F9F5FB",borderRadius:"16px",padding:mob?"20px 16px":"32px 32px 28px",display:"flex",flexDirection:"column",gap:"16px",maxWidth:"860px",margin:"0 auto"}}>

          {/* Header do card: título + data + mood */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"10px"}}>
            <span style={{fontFamily:"'Dancing Script',cursive",fontSize:mob?"26px":"34px",color:"#9070B0"}}>Devocional</span>
            <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
              <div style={{background:"#F0C8C0",borderRadius:"8px",padding:"6px 14px",fontSize:"12px",color:tc,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>{dn} {ms}. {yr}</div>
              <div style={{display:"flex",gap:"6px"}}>
                {MOODS.map(m=>(
                  <button key={m} onClick={()=>sm(mood===m?"":m)}
                    style={{fontSize:"20px",background:"none",border:mood===m?"2px solid #9070B0":"2px solid transparent",borderRadius:"8px",padding:"2px",cursor:"pointer",opacity:mood&&mood!==m?0.35:1,transition:"all .15s"}}>
                    {m}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Gratidão + Oração */}
          <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:"14px"}}>
            <div>
              <Label txt="Motivos de Gratidão" bg="#D4B8F0" color="#5A3880"/>
              <div style={boxStyle("#BFA8DC")}>
                <textarea value={gratidao} onChange={e=>sg(e.target.value)} placeholder="Digite seus motivos de gratidão…" style={taStyle}/>
              </div>
            </div>
            <div>
              <Label txt="Pedidos de Oração" bg="#B8D8F0" color="#2A5878"/>
              <div style={boxStyle("#90BCDC")}>
                <textarea value={oracao_pedidos} onChange={e=>sop(e.target.value)} placeholder="Digite seus pedidos…" style={taStyle}/>
              </div>
            </div>
          </div>

          {/* Leitura + Lições */}
          <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:"14px"}}>
            <div>
              <Label txt="Leitura Bíblica" bg="#F0B8D8" color="#882858"/>
              <div style={boxStyle("#DC98BC")}>
                <div style={{background:"#C4D4ED",borderRadius:"8px",padding:"8px 12px"}}>
                  <input type="text" value={leitura} onChange={e=>sl(e.target.value)} placeholder="Ex: João 3:16" style={inpStyle}/>
                </div>
              </div>
            </div>
            <div>
              <Label txt="3 Lições que Aprendi" bg="#B8E0D0" color="#1A6050"/>
              <div style={boxStyle("#90C0B0")}>
                {[[licao1,sl1,"#C8B8E0"],[licao2,sl2,"#E8C8D8"],[licao3,sl3,"#F8C0B0"]].map(([val,setVal,bg],i)=>(
                  <div key={i} style={liStyle(bg)}>
                    <input type="text" value={val} onChange={e=>setVal(e.target.value)} placeholder={`Lição ${i+1}…`} style={inpStyle}/>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Anotações */}
          <div>
            <Label txt="Minhas Anotações" bg="#F0C8C0" color="#883830"/>
            <div style={boxStyle("#E89898")}>
              <textarea value={anotacoes} onChange={e=>san(e.target.value)} placeholder="Suas anotações livres…" style={{...taStyle,minHeight:"110px"}}/>
            </div>
          </div>

          <p style={{textAlign:"center",fontSize:"10px",color:"#a090b0",letterSpacing:"1px",fontFamily:"'DM Sans',sans-serif"}}>@IZABELALGONCALVES</p>
        </div>
      </div>
    </div>
  );
}

function DevoEditor({entry,user,onSave,onCancel,mob}){
  const today=new Date();
  const initDate=entry?new Date(entry.date):today;
  const initCv=entry?devoContent(entry):{};
  const[selDate,ssd]=useState(initDate);
  const[mood,sm]=useState(initCv.mood||"");
  const[ref_,sr]=useState(initCv.referencia||"");
  const[texto,st]=useState(initCv.texto||"");
  const[refl,srl]=useState(initCv.reflexao||"");
  const[aplic,sap]=useState(initCv.aplicacao||"");
  const[orac,sor]=useState(initCv.oracao||"");
  const[bg,sbg]=useState(entry?.bg||BGS[0].v);
  const[font,sf]=useState(entry?.font||FONTS[1].value);
  const[fontSize,sfz]=useState(entry?.fontSize||15);
  const[saving,ssav]=useState(false);
  const{full,iso}=pdi(selDate.toISOString());
  const dk=dark(bg);
  const tc=dk?"rgba(255,255,255,0.92)":"#1a1410";
  const d=dc(bg);
  const bar=dk?"rgba(0,0,0,0.55)":"rgba(255,255,255,0.95)";
  const divClr=dk?"rgba(255,255,255,0.12)":"rgba(0,0,0,0.07)";
  const MOODS=["🙂","☹️","😢","😰"];
  const inp={width:"100%",background:"transparent",border:"none",outline:"none",borderBottom:`1px solid ${divClr}`,padding:"6px 0",fontFamily:font,fontSize:`${fontSize}px`,color:tc,lineHeight:1.7,resize:"none",overflow:"hidden"};
  const lbl={fontSize:"9px",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",color:d,fontFamily:"'Playfair Display',serif",display:"block",marginBottom:"4px"};
  const ar=el=>{if(!el)return;el.style.height="auto";el.style.height=el.scrollHeight+"px";};

  const handleSave=async()=>{
    if(!refl.trim()&&!texto.trim()&&!orac.trim()){alert("Preencha pelo menos um campo.");return;}
    ssav(true);
    const content=JSON.stringify({mood,referencia:ref_,texto,reflexao:refl,aplicacao:aplic,oracao:orac});
    const e={id:entry?entry.id:Date.now().toString(),date:selDate.toISOString(),content,tags:[],font,bg,fontSize,createdAt:entry?entry.createdAt:new Date().toISOString(),type:"devo"};
    await onSave(e);
    ssav(false);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:bg,transition:"background .3s"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 18px",background:bar,backdropFilter:"blur(12px)",borderBottom:dk?"1px solid rgba(255,255,255,0.08)":"1px solid rgba(0,0,0,0.06)",flexShrink:0}}>
        <button onClick={onCancel} style={{background:"none",border:"none",cursor:"pointer",fontSize:"14px",color:d,fontFamily:"'Lora',serif"}}>← Voltar</button>
        <div style={{display:"flex",alignItems:"center",gap:"6px",flex:1,justifyContent:"center"}}>
          <span style={{fontFamily:"'Playfair Display',serif",fontSize:"12px",color:d,fontStyle:"italic"}}>{full}</span>
          <label style={{cursor:"pointer",fontSize:"15px",flexShrink:0}}>
            <span>📅</span>
            <input type="date" value={iso} onChange={e=>{if(e.target.value)ssd(new Date(e.target.value+"T12:00:00"));}} style={{position:"absolute",opacity:0,width:"1px",height:"1px",pointerEvents:"none"}}/>
          </label>
        </div>
        <button onClick={handleSave} disabled={saving} style={{background:"none",border:"none",cursor:saving?"default":"pointer",fontSize:"14px",color:TERRACOTTA,fontWeight:700,fontFamily:"'Playfair Display',serif",opacity:saving?0.5:1}}>
          {saving?<span className="spin">⏳</span>:"SALVAR"}
        </button>
      </div>

      {/* Form card */}
      <div style={{flex:1,overflow:"auto",padding:mob?"12px":"20px"}}>
        <div style={{background:bg,borderRadius:"20px",padding:mob?"28px 22px":"36px 36px",minHeight:"calc(100vh - 170px)"}}>
          {/* Date + Mood */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
            <div style={{display:"flex",alignItems:"baseline",gap:"7px"}}>
              <span style={{fontFamily:"'Playfair Display',serif",fontSize:"44px",fontWeight:700,color:d,lineHeight:1}}>{pdi(selDate.toISOString()).dn}</span>
              <div><div style={{fontSize:"11px",color:d,lineHeight:1.3}}>{pdi(selDate.toISOString()).ms}.</div><div style={{fontSize:"11px",color:d,lineHeight:1.3}}>{pdi(selDate.toISOString()).yr}</div></div>
            </div>
            <div style={{display:"flex",gap:"8px"}}>
              {MOODS.map(m=>(
                <button key={m} onClick={()=>sm(mood===m?"":m)}
                  style={{fontSize:"22px",background:"none",border:mood===m?`2px solid ${d}`:"2px solid transparent",borderRadius:"10px",padding:"2px 4px",cursor:"pointer",opacity:mood&&mood!==m?0.4:1,transition:"all .15s"}}>
                  {m}
                </button>
              ))}
            </div>
          </div>
          <hr style={{border:"none",borderTop:`1px solid ${divClr}`,marginBottom:"20px"}}/>

          {/* Referência */}
          <div style={{marginBottom:"18px"}}>
            <span style={lbl}>Referência</span>
            <input type="text" value={ref_} onChange={e=>sr(e.target.value)} placeholder="Ex: João 3:16"
              style={{...inp,display:"block"}}/>
          </div>

          {/* Texto */}
          <div style={{marginBottom:"20px"}}>
            <span style={lbl}>Texto</span>
            <textarea value={texto} onChange={e=>{st(e.target.value);ar(e.target);}} placeholder="A passagem do dia…"
              style={{...inp,minHeight:"60px"}} ref={el=>el&&ar(el)}/>
          </div>
          <hr style={{border:"none",borderTop:`1px solid ${divClr}`,marginBottom:"20px"}}/>

          {/* Reflexão */}
          <div style={{marginBottom:"18px"}}>
            <span style={lbl}>Reflexão</span>
            <textarea value={refl} onChange={e=>{srl(e.target.value);ar(e.target);}} placeholder="O que esse texto me diz hoje…"
              style={{...inp,minHeight:"72px"}} ref={el=>el&&ar(el)}/>
          </div>

          {/* Aplicação */}
          <div style={{marginBottom:"18px"}}>
            <span style={lbl}>Aplicação</span>
            <textarea value={aplic} onChange={e=>{sap(e.target.value);ar(e.target);}} placeholder="Como vou aplicar isso hoje…"
              style={{...inp,minHeight:"60px"}} ref={el=>el&&ar(el)}/>
          </div>

          {/* Oração */}
          <div style={{marginBottom:"8px"}}>
            <span style={lbl}>Oração</span>
            <textarea value={orac} onChange={e=>{sor(e.target.value);ar(e.target);}} placeholder="Senhor…"
              style={{...inp,minHeight:"72px",fontStyle:"italic"}} ref={el=>el&&ar(el)}/>
          </div>
        </div>

        {/* Toolbar: cor de fundo, fonte, tamanho */}
        <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap",padding:"12px 4px 4px"}}>
          <div style={{display:"flex",gap:"4px",alignItems:"center"}}>
            {BGS.map(o=><button key={o.v} onClick={()=>sbg(o.v)} title={o.label} style={{width:"20px",height:"20px",borderRadius:"50%",background:o.v,padding:0,flexShrink:0,border:bg===o.v?"2.5px solid "+TERRACOTTA:"1.5px solid rgba(0,0,0,0.12)",cursor:"pointer"}}/>)}
          </div>
          <select value={font} onChange={e=>sf(e.target.value)}
            style={{background:dk?"rgba(255,255,255,0.1)":"#F5EDE0",border:"none",borderRadius:"9px",padding:"6px 10px",fontSize:"12px",color:tc,fontFamily:font,cursor:"pointer",outline:"none"}}>
            {FONTS.map(f=><option key={f.value} value={f.value} style={{fontFamily:f.value}}>{f.label}</option>)}
          </select>
          <div style={{display:"flex",alignItems:"center",gap:"2px",background:dk?"rgba(255,255,255,0.08)":"#F5EDE0",borderRadius:"9px",padding:"4px 6px"}}>
            <button onClick={()=>sfz(s=>Math.max(12,s-1))} style={{background:"none",border:"none",cursor:"pointer",color:TERRACOTTA,fontSize:"13px",fontWeight:700}}>A-</button>
            <span style={{fontSize:"10px",color:tc,minWidth:"24px",textAlign:"center"}}>{fontSize}px</span>
            <button onClick={()=>sfz(s=>Math.min(36,s+1))} style={{background:"none",border:"none",cursor:"pointer",color:TERRACOTTA,fontSize:"13px",fontWeight:700}}>A+</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── DEVOCIONAL: SEÇÃO (lista) ──────────────────────────────── */
function DevoSection({entries,user,onSave,onDel,openEditor,mob}){
  const devos=entries.filter(e=>e.type==="devo").sort((a,b)=>new Date(b.date)-new Date(a.date));
  const[selDevo,ss]=useState(null);
  const vRef=useRef(null);
  const grp=devos.reduce((a,e)=>{const d=new Date(e.date);const k=`${MPT[d.getMonth()]} ${d.getFullYear()}`;(a[k]=a[k]||[]).push(e);return a;},{});

  return(
    <div style={{display:"flex",height:"100%",overflow:"hidden"}}>
      {/* Lista lateral */}
      <div style={{width:mob?"100%":"280px",minWidth:mob?"100%":"280px",display:mob&&selDevo?"none":"flex",flexDirection:"column",borderRight:mob?"none":"1px solid #EDE5DC",background:"white",overflow:"hidden"}}>
        <div style={{padding:"18px 18px 14px",borderBottom:"1px solid #EDE5DC",flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"17px",color:"#1a1410"}}>✝️ Devocional</h2>
            <p style={{fontSize:"11px",color:"#c5b8a8",fontStyle:"italic",marginTop:"2px"}}>{devos.length} {devos.length===1?"registro":"registros"}</p>
          </div>
          <button onClick={()=>openEditor(null)} style={{background:AMBER,color:"white",border:"none",borderRadius:"10px",padding:"7px 13px",fontSize:"12px",cursor:"pointer",fontFamily:"'Playfair Display',serif"}}>+ Novo</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
          {devos.length===0?(
            <div style={{textAlign:"center",padding:"48px 0",color:"#d5c8b8"}}>
              <div style={{fontSize:"36px",marginBottom:"8px"}}>✝️</div>
              <p style={{fontSize:"13px"}}>Nenhum devocional ainda.</p>
              <p style={{fontSize:"12px",marginTop:"4px",color:"#e0d4c8"}}>Clique em "+ Novo" para começar.</p>
            </div>
          ):Object.entries(grp).map(([m,es])=>(
            <div key={m}>
              <div style={{fontSize:"9px",color:"#c5b8a8",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",padding:"10px 4px 5px"}}>{m}</div>
              {es.map(e=><DevoCard key={e.id} entry={e} active={selDevo?.id===e.id} onClick={()=>ss(e)}/>)}
            </div>
          ))}
        </div>
      </div>

      {/* Viewer */}
      {(!mob||selDevo)&&(
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          {selDevo?(
            <DevoViewer entry={selDevo} viewRef={vRef} onEdit={()=>openEditor(selDevo)} onDel={async()=>{await onDel(selDevo.id);ss(null);}} onBack={()=>ss(null)} mob={mob} saving={false}/>
          ):(
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"10px",color:"#d5c8b8"}}>
              <div style={{fontSize:"48px"}}>✝️</div>
              <p style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",color:"#b5a898"}}>Selecione um devocional</p>
              <button onClick={()=>openEditor(null)} style={{marginTop:"10px",background:AMBER,color:"white",border:"none",borderRadius:"14px",padding:"11px 26px",fontSize:"14px",cursor:"pointer",fontFamily:"'Playfair Display',serif"}}>Novo devocional</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}


/* ── SIDEBAR ────────────────────────────────────────────────── */
function Sidebar({entries,user,selDate,setSel,stag,sstag,selEntry,setSE,open,logout,showPdf,mob,onEntryClick,section,setSection}){
  const[tab,st]=useState("timeline");
  const diaryEntries=entries.filter(e=>e.type!=="frase");
  const tags=[...new Set(diaryEntries.flatMap(e=>e.tags||[]))];
  const fil=diaryEntries.filter(e=>!stag||(e.tags||[]).includes(stag)).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const grp=fil.reduce((a,e)=>{const d=new Date(e.date);const k=`${MPT[d.getMonth()]} ${d.getFullYear()}`;(a[k]=a[k]||[]).push(e);return a;},{});
  const ch=active=>({fontSize:"11px",padding:"4px 9px",borderRadius:"8px",cursor:"pointer",userSelect:"none",background:active?TERRACOTTA:"#F5EDE0",color:active?"white":"#8a7d70"});

  /* tabs de seção */
  const SecTabs=()=>(
    <div style={{display:"flex",gap:"6px",marginBottom:mob?"12px":"0",marginTop:mob?"12px":"0"}}>
      {[{k:"diary",icon:"📖",label:"Diário"},{k:"frases",icon:"🌸",label:"Frases"},{k:"devo",icon:"✝️",label:"Devo"}].map(({k,icon,label})=>(
        <button key={k} onClick={()=>setSection(k)}
          style={{flex:1,padding:"7px 0",borderRadius:"10px",border:"none",cursor:"pointer",fontSize:"11px",fontFamily:"'Lora',serif",fontWeight:section===k?700:400,
            background:section===k?(k==="frases"?"#EDD4FF":k==="devo"?"#F5E8C0":TERRACOTTA):"#F5EDE0",
            color:section===k?"white":"#8a7d70",transition:"all .15s"}}>
          {icon} {label}
        </button>
      ))}
    </div>
  );

  const header=(
    <div style={{padding:mob?"18px 18px 12px":"22px 20px 16px",borderBottom:"1px solid #EDE5DC",flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:mob?"22px":"20px",color:"#1a1410",letterSpacing:"-0.3px"}}>Meu Diário</h1>
          <p style={{fontSize:"11px",color:"#c5b8a8",marginTop:"2px",fontStyle:"italic"}}>{emailName(user?.email)}</p>
        </div>
        <div style={{display:"flex",gap:"8px"}}>
          {mob&&<button onClick={showPdf} style={{background:"#F5EDE0",border:"none",borderRadius:"10px",padding:"8px 11px",fontSize:"12px",cursor:"pointer",color:"#6a5a4a",fontFamily:"'Lora',serif"}}>PDF</button>}
          <button onClick={()=>open(null,new Date())} style={{background:TERRACOTTA,color:"white",border:"none",borderRadius:"11px",padding:mob?"9px 14px":"8px 14px",fontSize:mob?"13px":"12px",cursor:"pointer",fontFamily:"'Playfair Display',serif"}}>+ Nova</button>
        </div>
      </div>
      {mob&&<SecTabs/>}
      {mob&&section==="diary"&&(
        <div style={{display:"flex",gap:"8px",marginTop:"4px"}}>
          {["timeline","calendar"].map(t=>(
            <button key={t} onClick={()=>st(t)} style={{padding:"6px 14px",borderRadius:"10px",border:"none",cursor:"pointer",fontSize:"12px",fontFamily:"'Lora',serif",fontWeight:tab===t?600:400,background:tab===t?TERRACOTTA:"#F5EDE0",color:tab===t?"white":"#8a7d70",transition:"all .15s"}}>
              {t==="timeline"?"Linha do tempo":"Calendário"}
            </button>
          ))}
        </div>
      )}
    </div>
  );

  const calSection=(
    <div style={{padding:mob?"0 0 16px":"14px 18px",borderBottom:mob?"none":"1px solid #EDE5DC"}}>
      <Cal entries={entries} sel={selDate} onSel={date=>{setSel(date);const f=entries.find(e=>e.type!=="frase"&&(()=>{const d=new Date(e.date);return d.getDate()===date.getDate()&&d.getMonth()===date.getMonth()&&d.getFullYear()===date.getFullYear();})());if(f){setSE(f);if(onEntryClick)onEntryClick(f);}else setSE(null);}}/>
    </div>
  );

  const tagSection=tags.length>0&&(
    <div style={{padding:mob?"12px 0":"10px 18px",borderBottom:mob?"none":"1px solid #EDE5DC"}}>
      <p style={{fontSize:"9px",color:"#c5b8a8",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"7px"}}>Filtrar por tag</p>
      <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
        <span onClick={()=>sstag("")} style={ch(!stag)}>Todos</span>
        {tags.map(t=><span key={t} onClick={()=>sstag(stag===t?"":t)} style={ch(stag===t)}>#{t}</span>)}
      </div>
    </div>
  );

  const timeline=(
    <div style={{flex:1,overflowY:"auto",padding:mob?"12px 0":"8px 12px"}}>
      {Object.keys(grp).length===0?(
        <div style={{textAlign:"center",padding:mob?"48px 0":"36px 0",color:"#d5c8b8"}}>
          <div style={{fontSize:"36px",marginBottom:"8px"}}>🌿</div>
          <p style={{fontSize:"13px"}}>Nenhuma entrada ainda.</p>
          {mob&&<button onClick={()=>open(null,new Date())} style={{marginTop:"16px",background:TERRACOTTA,color:"white",border:"none",borderRadius:"12px",padding:"10px 24px",fontSize:"13px",cursor:"pointer",fontFamily:"'Playfair Display',serif"}}>Começar agora</button>}
        </div>
      ):Object.entries(grp).map(([m,es])=>(
        <div key={m}>
          <div style={{fontSize:"9px",color:"#c5b8a8",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",padding:mob?"12px 0 6px":"10px 4px 5px"}}>{m}</div>
          {es.map(e=><EntryCard key={e.id} entry={e} active={selEntry?.id===e.id} onClick={()=>{setSE(e);if(onEntryClick)onEntryClick(e);}}/>)}
        </div>
      ))}
    </div>
  );

  if(mob){
    return(
      <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"white"}}>
        {header}
        <div style={{flex:1,overflowY:"auto",padding:"12px 14px"}}>
          {section==="diary"&&(tab==="calendar"?<>{calSection}{tagSection}{timeline}</>:<>{tagSection}{timeline}</>)}
        </div>
        <div style={{borderTop:"1px solid #EDE5DC",padding:"10px 28px 14px",display:"flex",justifyContent:"space-around",alignItems:"center",background:"white",flexShrink:0}}>
          <button onClick={logout} style={{background:"none",border:"none",cursor:"pointer",fontSize:"11px",color:"#c5b8a8",fontFamily:"'Lora',serif",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}><span style={{fontSize:"20px"}}>🚪</span>Sair</button>
          <button onClick={()=>open(null,new Date())} style={{background:TERRACOTTA,color:"white",border:"none",borderRadius:"50%",width:"54px",height:"54px",fontSize:"28px",cursor:"pointer",boxShadow:"0 4px 16px rgba(196,120,90,0.4)",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:"6px"}}>+</button>
          <button onClick={showPdf} style={{background:"none",border:"none",cursor:"pointer",fontSize:"11px",color:"#c5b8a8",fontFamily:"'Lora',serif",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}><span style={{fontSize:"20px"}}>📄</span>PDF</button>
        </div>
      </div>
    );
  }

  return(
    <aside style={{width:"300px",minWidth:"300px",background:"white",borderRight:"1px solid #EDE5DC",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {header}
      <div style={{padding:"10px 18px 8px",borderBottom:"1px solid #EDE5DC",flexShrink:0}}><SecTabs/></div>
      {section==="diary"&&<>{calSection}{tagSection}{timeline}</>}
      {section==="frases"&&(
        <div style={{flex:1,overflowY:"auto",padding:"12px 14px"}}>
          <Cal entries={entries} sel={selDate} onSel={d=>setSel(d)}/>
        </div>
      )}
      {section==="devo"&&(
        <div style={{flex:1,overflowY:"auto",padding:"12px 14px"}}>
          <Cal entries={entries} sel={selDate} onSel={d=>setSel(d)}/>
        </div>
      )}
      <div style={{padding:"10px 18px",borderTop:"1px solid #EDE5DC",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={logout} style={{background:"none",border:"none",cursor:"pointer",fontSize:"11px",color:"#c5b8a8",fontFamily:"'Lora',serif"}}>Sair da conta</button>
        <button onClick={showPdf} style={{background:"#F5EDE0",border:"none",borderRadius:"9px",padding:"6px 12px",fontSize:"11px",cursor:"pointer",color:"#6a5a4a",fontFamily:"'Lora',serif"}}>📄 Exportar PDF</button>
      </div>
    </aside>
  );
}

/* ── APP ────────────────────────────────────────────────────── */
function App(){
  const mob=useMob();
  const[scr,setSCR]=useState("loading");
  const[user,su]=useState(null);
  const[entries,se]=useState([]);
  const[selEntry,sse]=useState(null);
  const[selDate,ssd]=useState(new Date());
  const[stag,sst]=useState("");
  const[ec,sec]=useState("");const[et,set]=useState([]);const[ef,sef]=useState(FONTS[0].value);
  const[ebg,sebg]=useState(BGS[0].v);const[efz,sefz]=useState(17);const[edit,sedit]=useState(null);
  const[pdfOpen,spdf]=useState(false);
  const[mobEnt,sme]=useState(false);
  const[saving,ssav]=useState(false);
  const[section,setSec]=useState("diary");  // "diary" | "frases" | "devo"
  const[isFrase,sIF]=useState(false);
  const[devoEdit,sDE]=useState(null); // entry being edited in DevoEditor
  const[showDevoEd,sSDE]=useState(false);
  const vRef=useRef(null);

  useEffect(()=>{
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session?.user){su(session.user);try{const e=await dbLoad();se(e);}catch(e){console.error(e);}setSCR("diary");}
      else{setSCR("login");}
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_ev,session)=>{if(!session)setSCR("login");});
    return()=>subscription.unsubscribe();
  },[]);

  const auth=async(mode,email,pass)=>{
    if(mode==="register"){const{data,error}=await sb.auth.signUp({email,password:pass});if(error)return error.message;if(data.user&&!data.session)return"Confirme seu e-mail para ativar a conta.";su(data.user);se([]);setSCR("diary");return null;}
    else{const{data,error}=await sb.auth.signInWithPassword({email,password:pass});if(error)return"E-mail ou senha incorretos.";su(data.user);try{const e=await dbLoad();se(e);}catch(e){console.error(e);}setSCR("diary");return null;}
  };

  const openEd=(entry=null,date=new Date(),frase=false)=>{
    sIF(frase);
    if(entry){sedit(entry);sec(entry.content);set(entry.tags||[]);sef(entry.font||FONTS[frase?1:0].value);sebg(entry.bg||(frase?getRandomPastel():BGS[0].v));sefz(entry.fontSize||(frase?15:17));ssd(new Date(entry.date));}
    else{sedit(null);sec("");set([]);sef(FONTS[frase?1:0].value);sebg(frase?getRandomPastel():BGS[0].v);sefz(frase?15:17);ssd(date);}
    setSCR("editor");
  };

  const saveEntry=async()=>{
    if(!ec.trim())return;ssav(true);
    const entry={id:edit?edit.id:Date.now().toString(),date:selDate.toISOString(),content:ec,tags:et,font:ef,bg:ebg,fontSize:efz,createdAt:edit?edit.createdAt:new Date().toISOString(),type:isFrase?"frase":"diary"};
    try{await dbSave(entry,user.id);const ne=edit?entries.map(x=>x.id===entry.id?entry:x):[...entries,entry];se(ne);sse(entry);if(mob)sme(true);setSCR("diary");}
    catch(e){alert("Erro ao salvar: "+e.message);}
    ssav(false);
  };

  const saveFrase=async(entry)=>{
    try{await dbSave(entry,user.id);se(prev=>prev.some(x=>x.id===entry.id)?prev.map(x=>x.id===entry.id?entry:x):[...prev,entry]);}
    catch(e){alert("Erro ao salvar: "+e.message);}
  };

  const saveDevo=async(entry)=>{
    try{await dbSave(entry,user.id);se(prev=>prev.some(x=>x.id===entry.id)?prev.map(x=>x.id===entry.id?entry:x):[...prev,entry]);sSDE(false);}
    catch(e){alert("Erro ao salvar: "+e.message);}
  };

  const del=async(id)=>{
    try{await dbDelete(id);se(prev=>prev.filter(e=>e.id!==id));sse(null);sme(false);}
    catch(e){alert("Erro ao excluir: "+e.message);}
  };

  const png=async()=>{
    if(!vRef.current||!window.html2canvas){alert("Aguarde o carregamento.");return;}
    try{const c=await window.html2canvas(vRef.current,{scale:2,useCORS:true,backgroundColor:null,logging:false});const a=document.createElement("a");a.download=`diario-${new Date(selEntry?.date||Date.now()).toLocaleDateString("pt-BR").replace(/\//g,"-")}.png`;a.href=c.toDataURL("image/png");a.click();}
    catch{alert("Erro ao gerar imagem.");}
  };

  const logout=async()=>{await sb.auth.signOut();su(null);se([]);sse(null);setSCR("login");};

  if(scr==="loading")return<Loading/>;
  if(scr==="login")return<Login onAuth={auth}/>;
  if(showDevoEd)return(
    <DevoEditor entry={devoEdit} user={user} onSave={async(e)=>{await saveDevo(e);}} onCancel={()=>sSDE(false)} mob={mob}/>
  );
  if(scr==="editor")return(
    <Editor eRef={vRef} content={ec} sc={sec} tags={et} st={set} font={ef} sf={sef} bg={ebg} sbg={sebg} fontSize={efz} sfz={sefz}
      date={selDate} sd={ssd} onSave={saveEntry} onCancel={()=>setSCR("diary")} mob={mob} saving={saving} isFrase={isFrase}/>
  );

  const sbProps={entries,user,selDate,setSel:ssd,stag,sstag:sst,selEntry,setSE:sse,open:openEd,logout,showPdf:()=>spdf(true),section,setSection:setSec};

  /* Mobile: viewer frase */
  if(mob&&mobEnt&&selEntry&&selEntry.type==="frase")return(
    <><div style={{height:"100vh",overflow:"hidden",display:"flex",flexDirection:"column"}}>
      <FraseViewer entry={selEntry} viewRef={vRef} onEdit={()=>openEd(selEntry,new Date(selEntry.date),true)} onDel={()=>del(selEntry.id)} onPng={png} onBack={()=>sme(false)} mob={true} saving={saving}/>
    </div>{pdfOpen&&<PdfModal entries={entries} onClose={()=>spdf(false)}/>}</>
  );

  /* Mobile: viewer diário */
  if(mob&&mobEnt&&selEntry)return(
    <><div style={{height:"100vh",overflow:"hidden",display:"flex",flexDirection:"column"}}>
      <Viewer entry={selEntry} viewRef={vRef} onEdit={()=>openEd(selEntry)} onDel={()=>del(selEntry.id)} onPng={png} onBack={()=>sme(false)} mob={true} saving={saving}/>
    </div>{pdfOpen&&<PdfModal entries={entries} onClose={()=>spdf(false)}/>}</>
  );

  /* Mobile: devo */
  if(mob&&section==="devo")return(
    <><div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#F7F3EE"}}>
      <div style={{padding:"14px 18px 10px",borderBottom:"1px solid #EDE5DC",background:"white",flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",gap:"6px"}}>
          {[{k:"diary",icon:"📖"},{k:"frases",icon:"🌸"},{k:"devo",icon:"✝️"}].map(({k,icon})=>(
            <button key={k} onClick={()=>setSec(k)} style={{padding:"6px 12px",borderRadius:"10px",border:"none",cursor:"pointer",fontSize:"13px",fontFamily:"'Lora',serif",fontWeight:section===k?700:400,background:section===k?(k==="frases"?"#EDD4FF":k==="devo"?"#F5E8C0":TERRACOTTA):"#F5EDE0",color:section===k?"white":"#8a7d70"}}>{icon}</button>
          ))}
        </div>
        <button onClick={logout} style={{background:"none",border:"none",cursor:"pointer",fontSize:"11px",color:"#c5b8a8",fontFamily:"'Lora',serif"}}>Sair</button>
      </div>
      <div style={{flex:1,overflow:"hidden"}}>
        <DevoSection entries={entries} user={user} onSave={saveDevo} onDel={del} openEditor={e=>{sDE(e||null);sSDE(true);}} mob={true}/>
      </div>
      <div style={{borderTop:"1px solid #EDE5DC",padding:"10px 28px 14px",display:"flex",justifyContent:"space-around",alignItems:"center",background:"white",flexShrink:0}}>
        <button onClick={()=>setSec("diary")} style={{background:"none",border:"none",cursor:"pointer",fontSize:"11px",color:"#c5b8a8",fontFamily:"'Lora',serif",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}><span style={{fontSize:"20px"}}>📖</span>Diário</button>
        <button onClick={()=>spdf(true)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"11px",color:"#c5b8a8",fontFamily:"'Lora',serif",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}><span style={{fontSize:"20px"}}>📄</span>PDF</button>
      </div>
    </div>{pdfOpen&&<PdfModal entries={entries} onClose={()=>spdf(false)}/>}</>
  );

  /* Mobile: frases grid */
  if(mob&&section==="frases")return(
    <><div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#F7F3EE"}}>
      <div style={{padding:"16px 18px 12px",borderBottom:"1px solid #EDE5DC",background:"white",flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",gap:"8px"}}>
          {[{k:"diary",icon:"📖"},{k:"frases",icon:"🌸"},{k:"devo",icon:"✝️"}].map(({k,icon})=>(
            <button key={k} onClick={()=>setSec(k)} style={{padding:"7px 12px",borderRadius:"10px",border:"none",cursor:"pointer",fontSize:"13px",fontFamily:"'Lora',serif",fontWeight:section===k?700:400,background:section===k?(k==="frases"?"#EDD4FF":k==="devo"?"#F5E8C0":TERRACOTTA):"#F5EDE0",color:section===k?"white":"#8a7d70"}}>
              {icon}
            </button>
          ))}
        </div>
        <button onClick={logout} style={{background:"none",border:"none",cursor:"pointer",fontSize:"11px",color:"#c5b8a8",fontFamily:"'Lora',serif"}}>Sair</button>
      </div>
      <div style={{flex:1,overflow:"hidden"}}>
        <FrasesSection entries={entries} user={user} onSave={saveFrase} onDel={del} openFullEditor={e=>{sse(e);openEd(e,new Date(e.date),true);}} mob={true}/>
      </div>
      <div style={{borderTop:"1px solid #EDE5DC",padding:"10px 28px 14px",display:"flex",justifyContent:"space-around",alignItems:"center",background:"white",flexShrink:0}}>
        <button onClick={()=>setSec("diary")} style={{background:"none",border:"none",cursor:"pointer",fontSize:"11px",color:"#c5b8a8",fontFamily:"'Lora',serif",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}><span style={{fontSize:"20px"}}>📖</span>Diário</button>
        <button onClick={()=>spdf(true)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"11px",color:"#c5b8a8",fontFamily:"'Lora',serif",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}><span style={{fontSize:"20px"}}>📄</span>PDF</button>
      </div>
    </div>{pdfOpen&&<PdfModal entries={entries} onClose={()=>spdf(false)}/>}</>
  );

  /* Mobile: diário */
  if(mob)return(
    <><Sidebar {...sbProps} mob={true} onEntryClick={e=>{sse(e);sme(true);}}/>{pdfOpen&&<PdfModal entries={entries} onClose={()=>spdf(false)}/>}</>
  );

  /* Desktop */
  return(
    <><div style={{display:"flex",height:"100vh",fontFamily:"'Lora',Georgia,serif",background:"#F7F3EE"}}>
      <Sidebar {...sbProps} mob={false}/>
      <main style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {section==="devo"?(
          <DevoSection entries={entries} user={user} onSave={saveDevo} onDel={del} openEditor={e=>{sDE(e||null);sSDE(true);}} mob={false}/>
        ):section==="frases"?(
          <FrasesSection entries={entries} user={user} onSave={saveFrase} onDel={del} openFullEditor={e=>{sse(e);openEd(e,new Date(e.date),true);}} mob={false}/>
        ):selEntry?(
          selEntry.type==="frase"
            ?<FraseViewer entry={selEntry} viewRef={vRef} onEdit={()=>openEd(selEntry,new Date(selEntry.date),true)} onDel={()=>del(selEntry.id)} onPng={png} mob={false} saving={saving}/>
            :<Viewer entry={selEntry} viewRef={vRef} onEdit={()=>openEd(selEntry)} onDel={()=>del(selEntry.id)} onPng={png} mob={false} saving={saving}/>
        ):(
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"10px"}}>
            <div style={{fontSize:"56px"}}>📖</div>
            <p style={{fontFamily:"'Playfair Display',serif",fontSize:"22px",color:"#b5a898"}}>Selecione uma entrada</p>
            <p style={{fontSize:"13px",color:"#d5c8b8"}}>ou comece uma nova</p>
            <button onClick={()=>openEd(null,new Date())} style={{marginTop:"12px",background:TERRACOTTA,color:"white",border:"none",borderRadius:"14px",padding:"12px 28px",fontSize:"14px",cursor:"pointer",fontFamily:"'Playfair Display',serif"}}>Escrever hoje</button>
          </div>
        )}
      </main>
    </div>{pdfOpen&&<PdfModal entries={entries} onClose={()=>spdf(false)}/>}</>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>if("serviceWorker"in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("/meu-diario/sw.js");});}</script>
</body>
</html>
